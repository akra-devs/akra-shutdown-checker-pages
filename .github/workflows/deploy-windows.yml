name: Deploy latest WhyShutdown Windows build

on:
  schedule:
    - cron: "3-59/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Redeploy even when the source commit is unchanged
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: whyshutdown-pages-sync
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: akra-devs/akra-shutdown-checker
  SOURCE_WORKFLOW: windows-release.yml
  TRANSFER_ARTIFACT: whyshutdown-site-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  fetch-private-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deploy: ${{ steps.resolve.outputs.deploy }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      source_run_id: ${{ steps.resolve.outputs.source_run_id }}
    steps:
      - name: Resolve latest successful private build
        id: resolve
        shell: bash
        env:
          SOURCE_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          TARGET_TOKEN: ${{ github.token }}
          FORCE_DEPLOY: ${{ inputs.force }}
        run: |
          set -euo pipefail
          set +x

          if [[ -z "${SOURCE_TOKEN:-}" ]]; then
            echo '::error title=Missing PERSONAL_TOKEN::The Pages repository cannot read the private source artifact.'
            exit 1
          fi

          if ! source_is_private="$(GH_TOKEN="$SOURCE_TOKEN" gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${SOURCE_REPOSITORY}" --jq '.private')"; then
            echo '::error title=Private source unavailable::PERSONAL_TOKEN cannot read the private source repository.'
            exit 1
          fi

          if [[ "$source_is_private" != 'true' ]]; then
            echo '::error title=Source privacy changed::Expected the source repository to remain private.'
            exit 1
          fi

          runs_json="$(GH_TOKEN="$SOURCE_TOKEN" gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${SOURCE_REPOSITORY}/actions/workflows/${SOURCE_WORKFLOW}/runs?branch=main&status=success&per_page=20")"

          run_id="$(jq -r '
            [.workflow_runs[]
              | select(
                  (.event == "push" or .event == "workflow_dispatch")
                  and .head_branch == "main"
                )
            ][0].id // empty
          ' <<<"$runs_json")"
          source_sha="$(jq -r --argjson run_id "${run_id:-0}" '
            [.workflow_runs[] | select(.id == $run_id)][0].head_sha // empty
          ' <<<"$runs_json")"
          run_attempt="$(jq -r --argjson run_id "${run_id:-0}" '
            [.workflow_runs[] | select(.id == $run_id)][0].run_attempt // empty
          ' <<<"$runs_json")"

          if [[ -z "$run_id" || -z "$source_sha" || -z "$run_attempt" ]]; then
            echo '::error title=No deployable build::No successful main-branch Windows build was found.'
            exit 1
          fi

          expected_artifact="whyshutdown-windows-${run_id}-${run_attempt}"
          artifacts_json="$(GH_TOKEN="$SOURCE_TOKEN" gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${SOURCE_REPOSITORY}/actions/runs/${run_id}/artifacts")"
          artifact_id="$(jq -r --arg expected "$expected_artifact" '
            [.artifacts[] | select(.name == $expected and .expired == false)][0].id // empty
          ' <<<"$artifacts_json")"

          if [[ -z "$artifact_id" ]]; then
            echo "::error title=Build artifact missing::${expected_artifact} is missing or expired."
            exit 1
          fi

          current_sha=''
          if current_b64="$(GH_TOKEN="$TARGET_TOKEN" gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/contents/.source-sha?ref=gh-pages" \
            --jq '.content' 2>/dev/null)"; then
            current_sha="$(base64 --decode <<<"$current_b64" | tr -d '\r\n')"
          fi

          if [[ "$source_sha" == "$current_sha" && "${FORCE_DEPLOY:-false}" != 'true' ]]; then
            echo "AKRA WhyShutdown ${source_sha} is already deployed."
            {
              echo 'deploy=false'
              echo "source_sha=${source_sha}"
              echo "source_run_id=${run_id}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo 'deploy=true'
            echo "artifact_id=${artifact_id}"
            echo "source_sha=${source_sha}"
            echo "source_run_id=${run_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Check out download page
        if: steps.resolve.outputs.deploy == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download and verify private Windows artifact
        if: steps.resolve.outputs.deploy == 'true'
        shell: bash
        env:
          SOURCE_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          ARTIFACT_ID: ${{ steps.resolve.outputs.artifact_id }}
          SOURCE_SHA: ${{ steps.resolve.outputs.source_sha }}
        run: |
          set -euo pipefail
          set +x
          umask 077

          GH_TOKEN="$SOURCE_TOKEN" gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${SOURCE_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > artifact.zip
          mkdir artifact
          unzip -q artifact.zip -d artifact
          rm -f artifact.zip

          jq -e --arg source_sha "$SOURCE_SHA" '
            .source_sha == $source_sha
            and (.version | type == "string")
            and (.file_name | type == "string")
            and (.sha256 | test("^[0-9a-f]{64}$"))
            and (.size_bytes | type == "number" and . > 0)
          ' artifact/release.json >/dev/null

          file_name="$(jq -r '.file_name' artifact/release.json)"
          expected_hash="$(jq -r '.sha256' artifact/release.json)"
          if [[ ! "$file_name" =~ ^AKRA-WhyShutdown-v[0-9]+\.[0-9]+\.[0-9]+-windows-x64-[0-9a-f]{7}\.zip$ ]]; then
            echo "::error title=Unexpected file name::${file_name} is not a release package name."
            exit 1
          fi

          test -s "artifact/${file_name}"
          test -s "artifact/${file_name}.sha256"
          test "$(stat -c '%s' "artifact/${file_name}")" -lt 100000000
          test "$(sha256sum "artifact/${file_name}" | cut -d' ' -f1)" = "$expected_hash"
          tr -d '\r' < "artifact/${file_name}.sha256" \
            | grep -Fxq "${expected_hash}  ${file_name}"

          rm -rf package
          mkdir package
          unzip -q "artifact/${file_name}" -d package
          test -s package/AKRA-WhyShutdown-windows-x64/target/release/powertrace.exe
          test -s package/AKRA-WhyShutdown-windows-x64/target/release/powertrace-ui.exe
          test -s package/AKRA-WhyShutdown-windows-x64/scripts/install.ps1
          test -s package/AKRA-WhyShutdown-windows-x64/scripts/uninstall.ps1
          if find package -type l -print -quit | grep -q .; then
            echo '::error title=Unsafe artifact::Symbolic links are not allowed in the Windows distribution.'
            exit 1
          fi
          rm -rf package

          cp -a site publish
          cp "artifact/${file_name}" "publish/${file_name}"
          cp "artifact/${file_name}.sha256" "publish/${file_name}.sha256"
          cp artifact/release.json publish/release.json
          cp "artifact/${file_name}" publish/AKRA-WhyShutdown-windows-x64.zip
          printf '%s  %s\n' "$expected_hash" 'AKRA-WhyShutdown-windows-x64.zip' \
            > publish/AKRA-WhyShutdown-windows-x64.zip.sha256
          printf '%s\n' "$SOURCE_SHA" > publish/.source-sha
          touch publish/.nojekyll

      - name: Upload verified public bundle
        if: steps.resolve.outputs.deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TRANSFER_ARTIFACT }}
          path: publish
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
          compression-level: 0

  publish-gh-pages:
    if: needs.fetch-private-build.outputs.deploy == 'true'
    needs: fetch-private-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: github-pages
      url: https://akra-devs.github.io/akra-shutdown-checker-pages/
    steps:
      - name: Download verified public bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TRANSFER_ARTIFACT }}
          path: publish

      - name: Publish gh-pages branch
        shell: bash
        env:
          TARGET_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ needs.fetch-private-build.outputs.source_sha }}
        run: |
          set -euo pipefail
          set +x

          test -s publish/index.html
          test -s publish/AKRA-WhyShutdown-windows-x64.zip
          test -s publish/AKRA-WhyShutdown-windows-x64.zip.sha256
          test -s publish/release.json
          test -f publish/.nojekyll
          test "$(cat publish/.source-sha)" = "$SOURCE_SHA"

          git init --initial-branch=gh-pages deployment
          rsync -a --exclude='.git/' publish/ deployment/
          git -C deployment config user.name 'github-actions[bot]'
          git -C deployment config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C deployment add --all
          git -C deployment commit -m "Deploy WhyShutdown from $SOURCE_SHA"
          git -C deployment remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"

          umask 077
          askpass="$(mktemp)"
          trap 'rm -f "$askpass"' EXIT
          cat > "$askpass" <<'ASKPASS'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) printf '%s\n' "${TARGET_TOKEN:?}" ;;
            *) exit 1 ;;
          esac
          ASKPASS
          chmod 700 "$askpass"

          GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 \
            git -C deployment -c credential.helper= push --force origin HEAD:gh-pages
